    narration_genre: 'Phandalin is character-centered literary fantasy narrated in
      close first-person past tense, one POV per section, with the heading naming
      the character. The prose breathes with whoever is speaking — Vukradin''s principled
      volleys, Soma''s tortle-patient asides ("shell sprout"), Valphine''s drow-aesthete
      pain theology ("deliciously painful"), Brewbarry''s short declaratives. Tone
      shifts scene to scene: earnest moral conviction, dark comedy from contradiction,
      mechanical procedural during combat (hit points, saves, the named spell), then
      back to lyrical interior. Dialogue carries subtext; characters rarely say what
      they mean. Magic and corruption are felt somatically before they are named.
      Description is sparse but specific; favor the material noun over the poetic
      image. The narrator never editorializes — each POV''s frame is the only frame.'
