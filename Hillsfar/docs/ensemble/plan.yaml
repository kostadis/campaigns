# docs/ensemble/plan.yaml — Hillsfar (DDEX34) ensemble extraction plan
# Source chapters are the per-session gm-assist.md files, staged into
# docs/chapters/chapter_NN_<title>.md (ground truth).
passes:
  - name: small
    agent: extract_facts
    chunk_size: 6000
    annotate_pov: true
  - name: large
    agent: extract_facts
    chunk_size: 15000
    annotate_pov: true
  - name: sweep
    agent: extract_facts_sweep
    chunk_size: 15000
    annotate_pov: true
  - name: temporal
    agent: extract_facts_temporal
    chunk_size: 15000
    annotate_pov: true
  - name: interiority
    agent: extract_facts_interiority
    chunk_size: 15000
    annotate_pov: true
